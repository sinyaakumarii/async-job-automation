<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async AI Job Processor UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-100 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-2xl bg-[#1e293b] rounded-2xl shadow-2xl border border-slate-700/50 p-8">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-tight">
                Async AI Worker Portal
            </h1>
            <p class="text-slate-400 mt-2 text-sm font-mono">Express + Redis + BullMQ + Gemini 3.5 Flash</p>
        </div>
        <div class="space-y-4">
            <label class="block text-sm font-semibold text-slate-300">Apna AI Prompt Likhein:</label>
            <textarea id="promptInput" rows="4" 
                class="w-full p-4 bg-[#0f172a] border border-slate-700 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:outline-none text-slate-100 resize-none transition duration-200"
                placeholder="E.g., Write a 3-step guide to learn Node.js..."></textarea>
            <button id="submitBtn" onclick="submitJob()"
                class="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 active:scale-[0.99] transition-all duration-150 text-white font-bold rounded-xl shadow-lg shadow-cyan-500/20">
                Generate Response (Async POST)
            </button>
        </div>
        <div class="mt-8 border-t border-slate-700/50 pt-6 space-y-4">
            <div class="flex items-center justify-between text-sm">
                <span class="text-slate-400">Job ID: <strong id="jobIdDisplay" class="font-mono text-cyan-400">N/A</strong></span>
                <span id="statusBadge" class="px-3 py-1 bg-slate-800 text-slate-400 rounded-full text-xs font-bold uppercase tracking-wider">Idle</span>
            </div>
            <div id="loader" class="hidden flex items-center space-x-3 text-slate-400 text-sm">
                <div class="animate-spin rounded-full h-5 w-5 border-2 border-cyan-500 border-t-transparent"></div>
                <span id="loaderText">Background Worker status check kar raha hai (Polling)...</span>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-slate-300">AI Response Output:</label>
                <div id="outputBox" class="w-full min-h-[120px] p-4 bg-[#0f172a] border border-slate-800 rounded-xl font-mono text-sm text-slate-300 whitespace-pre-wrap leading-relaxed">
                    Aapka response yahan show hoga...
                </div>
            </div>
        </div>
    </div>
    <script>
        async function submitJob() {
            const promptInput = document.getElementById('promptInput');
            const submitBtn = document.getElementById('submitBtn');
            const jobIdDisplay = document.getElementById('jobIdDisplay');
            const statusBadge = document.getElementById('statusBadge');
            const loader = document.getElementById('loader');
            const outputBox = document.getElementById('outputBox');
            const prompt = promptInput.value.trim();
            if (!prompt) { alert('Pehle ek valid prompt likhein!'); return; }
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            outputBox.innerText = "Queue mein job daali ja rahi hai...";
            statusBadge.className = "px-3 py-1 bg-yellow-500/20 text-yellow-400 rounded-full text-xs font-bold uppercase tracking-wider";
            statusBadge.innerText = "PENDING";
            loader.classList.remove('hidden');
            try {
                const response = await fetch('/v1/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                if (!response.ok) throw new Error('Job submit nahi ho saki!');
                const data = await response.json();
                jobIdDisplay.innerText = data.jobId;
                outputBox.innerText = "Job queue mein add ho gayi! Processing status poll kiya ja raha hai...";
                pollJobStatus(data.jobId);
            } catch (err) {
                outputBox.innerText = `Error: ${err.message}`;
                statusBadge.className = "px-3 py-1 bg-red-500/20 text-red-400 rounded-full text-xs font-bold uppercase tracking-wider";
                statusBadge.innerText = "ERROR";
                loader.classList.add('hidden');
                resetButton();
            }
        }
        async function pollJobStatus(jobId) {
            const statusBadge = document.getElementById('statusBadge');
            const outputBox = document.getElementById('outputBox');
            const loader = document.getElementById('loader');
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`/v1/jobs/${jobId}`);
                    if (!response.ok) throw new Error('Status fetching failed!');
                    const job = await response.json();
                    if (job.status === 'processing') {
                        statusBadge.className = "px-3 py-1 bg-blue-500/20 text-blue-400 rounded-full text-xs font-bold uppercase tracking-wider";
                        statusBadge.innerText = "PROCESSING";
                        outputBox.innerText = "Gemini Model response ready kar raha hai...";
                    } else if (job.status === 'completed') {
                        clearInterval(interval);
                        statusBadge.className = "px-3 py-1 bg-emerald-500/20 text-emerald-400 rounded-full text-xs font-bold uppercase tracking-wider";
                        statusBadge.innerText = "COMPLETED";
                        outputBox.innerText = job.result;
                        loader.classList.add('hidden');
                        resetButton();
                    } else if (job.status === 'failed') {
                        clearInterval(interval);
                        statusBadge.className = "px-3 py-1 bg-red-500/20 text-red-400 rounded-full text-xs font-bold uppercase tracking-wider";
                        statusBadge.innerText = "FAILED";
                        outputBox.innerText = `Job fail ho gayi. Error: ${job.error}`;
                        loader.classList.add('hidden');
                        resetButton();
                    }
                } catch (err) {
                    clearInterval(interval);
                    outputBox.innerText = `Polling Error: ${err.message}`;
                    loader.classList.add('hidden');
                    resetButton();
                }
            }, 1500);
        }
        function resetButton() {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    </script>
</body>
</html>ls
